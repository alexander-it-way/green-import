backend:
  name: github
  repo: alexvorobyov/green-import
  branch: main

local_backend: true

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: "ru"

collections:
  - name: "materials"
    label: "Каталог: Стройматериалы"
    files:
      - label: "Материалы"
        name: "materials"
        file: "data/materials.json"
        fields:
          - label: "Позиции"
            name: "items"
            widget: "list"
            summary: "{{fields.sku}} — {{fields.name.ru}}"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "SKU", name: "sku", widget: "string" }
              - label: "Изображения"
                name: "images"
                widget: "list"
                field: { label: "URL изображения", name: "image", widget: "string" }
              - label: "Название"
                name: "name"
                widget: "object"
                fields:
                  - { label: "Русский", name: "ru", widget: "string" }
                  - { label: "English", name: "en", widget: "string" }
                  - { label: "Հայերեն", name: "am", widget: "string" }
              - label: "Описание"
                name: "desc"
                widget: "object"
                fields:
                  - { label: "Русский", name: "ru", widget: "text" }
                  - { label: "English", name: "en", widget: "text" }
                  - { label: "Հայերեն", name: "am", widget: "text" }
